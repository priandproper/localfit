name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      # Build directly with vite (NOT `npm run build`) to SKIP the `sync` step:
      # data/state.json holds personal data, does not exist in CI, and must never
      # be bundled. VITE_BASE sets the /localfit/ subpath; VITE_API_BASE points
      # the shell at the home Mac mini's HTTPS backend.
      - run: npx vite build
        env:
          VITE_BASE: /localfit/
          VITE_API_BASE: https://Aniruddhas-Mac-mini.local:8788
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
